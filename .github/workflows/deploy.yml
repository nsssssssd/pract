name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/tulpan
            echo "=== Backing up uploads ==="
            if [ -d "public/uploads" ]; then
              cp -r public/uploads /tmp/tulpan-uploads-backup
            fi
            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main
            echo "=== Restoring uploads ==="
            mkdir -p public/uploads
            if [ -d "/tmp/tulpan-uploads-backup" ]; then
              cp -rn /tmp/tulpan-uploads-backup/* public/uploads/ 2>/dev/null || true
              rm -rf /tmp/tulpan-uploads-backup
            fi
            echo "=== Installing dependencies ==="
            npm ci
            echo "=== Building ==="
            rm -rf .next
            npm run build
            echo "=== Restarting PM2 ==="
            pm2 restart tulpan-next || pm2 start ecosystem.config.js
            pm2 save
            echo "=== Cleaning up old builds ==="
            rm -rf /tmp/.next-*
            echo "=== Deployed at $(date) ==="

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 3
            curl -sf http://localhost:3000 > /dev/null && echo "✅ Health check passed" || (echo "❌ Health check failed" && exit 1)
